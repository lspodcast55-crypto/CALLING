<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULANIA'S CALLS </title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --liquid-gold: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            color: #fff; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            /* ATTRACTIVE MESH GRADIENT BACKGROUND */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING ORBS FOR EXTRA ATTRACTIVENESS */
        .orb {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; z-index: -1; animation: float 20s infinite alternate;
        }
        .orb-1 { top: -100px; left: -100px; }
        .orb-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }

        /* AUTH CARDS - GLASSMORPHISM */
        .auth-card {
            text-align: center; background: var(--glass-bg); padding: 40px; 
            border-radius: 35px; border: 1px solid var(--glass-border); 
            width: 380px; backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* BUTTONS WITH SHIMMER */
        .primary-btn { 
            position: relative; background: var(--liquid-gold); border: none; padding: 14px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; 
            width: 100%; margin-top: 10px; overflow: hidden; transition: 0.4s;
            box-shadow: 0 4px 15px rgba(248, 181, 0, 0.3);
        }
        .primary-btn:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); box-shadow: 0 10px 25px rgba(248, 181, 0, 0.5); }
        .primary-btn:active { transform: scale(0.98); }

        /* MAIN UI */
        #profile-setup, #mode-selection, #main-content { display: none; }
        header { padding: 15px; text-align: center; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        h1 { background: var(--liquid-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-size: 1.6rem; letter-spacing: 5px; font-weight: 900; text-transform: uppercase; }

        .main-layout { display: flex; flex: 1; padding: 25px; gap: 20px; overflow: hidden; }
        .video-section { flex: 2.2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: center; }
        .video-container { display: flex; flex-direction: column; gap: 12px; }
        .video-wrapper { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--glass-border); background: #000; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .user-info-bar { background: var(--glass-bg); border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--glass-border); backdrop-filter: blur(15px); }
        .info-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fccd4d; object-fit: cover; }
        .info-name { font-weight: 800; color: #fccd4d; font-size: 0.95em; }

        .chat-section { flex: 1; background: var(--glass-bg); border-radius: 30px; display: flex; flex-direction: column; border: 1px solid var(--glass-border); backdrop-filter: blur(20px); }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 15px; border-radius: 18px; max-width: 85%; font-size: 0.9em; animation: pop 0.4s ease-out; }
        .sent { background: var(--liquid-gold); color: #000; align-self: flex-end; font-weight: 600; border-bottom-right-radius: 2px; }
        .received { background: rgba(255, 255, 255, 0.15); color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }

        input { padding: 14px; border-radius: 15px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.1); color: #fff; outline: none; margin-bottom: 15px; width: 85%; }
        ::placeholder { color: rgba(255,255,255,0.6); }
        .footer-controls { padding: 15px; display: flex; justify-content: center; gap: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--glass-border); backdrop-filter: blur(20px); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div id="login-screen" class="auth-card">
        <h2 style="color: #fccd4d; text-shadow: var(--text-shadow);">SECURE</h2>
        <input type="password" id="pass-input" placeholder="ENTER PIN" style="text-align: center; letter-spacing: 8px;">
        <button class="primary-btn" onclick="checkPassword()">Verify</button>
    </div>

    <div id="profile-setup" class="auth-card">
        <h2 style="color: #fccd4d;">SET IDENTITY</h2>
        <img id="pfp-preview" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; border:3px solid #fccd4d; margin:10px auto; cursor:pointer;" onclick="document.getElementById('pfp-input').click()">
        <input type="file" id="pfp-input" class="hidden" accept="image/*" onchange="previewPFP(this)">
        <input type="text" id="user-name" placeholder="Full Name">
        <input type="text" id="user-detail" placeholder="who">
        <button class="primary-btn" onclick="saveProfile()">Start Experience</button>
    </div>

    <div id="mode-selection" class="auth-card">
        <h2 style="color: #fccd4d;">PLEASE CHOOSE ONE </h2>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="primary-btn" onclick="setMode('chat')">Chat</button>
            <button class="primary-btn" onclick="setMode('video')">Video CALL</button>
            <button class="primary-btn" onclick="setMode('both')">BOTH ACCESS</button>
        </div>
    </div>

    <div id="main-content" style="width: 100%; height: 100vh; flex-direction: column;">
        <header>
            <h1>SULANIA'S CALLS</h1>
            <div style="font-size: 0.7em; color: #ddd;">CONNECTION CODE:- <span id="my-id" style="color:#fccd4d; font-weight: bold;">----</span></div>
        </header>
        <div class="main-layout">
            <div id="v-sec" class="video-section">
                <div class="video-container">
                    <div class="video-wrapper"><video id="local-video" autoplay muted></video></div>
                    <div class="user-info-bar">
                        <img id="my-info-pfp" src="" class="info-pfp">
                        <div class="info-text">
                            <span id="my-info-name" class="info-name">You</span>
                            <span style="font-size:0.7em; color:#ddd;" id="my-info-detail">Developer</span>
                        </div>
                    </div>
                </div>
                <div class="video-container">
                    <div class="video-wrapper"><video id="remote-video" autoplay></video></div>
                    <div class="user-info-bar">
                        <img id="peer-info-pfp" src="https://via.placeholder.com/45" class="info-pfp">
                        <div class="info-text">
                            <span id="peer-info-name" class="info-name">Partner</span>
                            <span style="font-size:0.7em; color:#ddd;" id="peer-info-detail">Offline</span>
                        </div>
                    </div>
                </div>
            </div>
            <div id="c-sec" class="chat-section">
                <div id="chat-box"></div>
                <div style="padding: 15px; display: flex; gap: 10px;">
                    <button class="primary-btn" style="width: 45px; margin-top:0;" onclick="document.getElementById('file-input').click()">📎</button>
                    <input type="file" id="file-input" class="hidden" onchange="sendFile(this)">
                    <input type="text" id="msg-input" placeholder="Message..." style="flex:1; margin-bottom:0;">
                    <button class="primary-btn" style="width: 80px; margin-top:0;" onclick="sendMsg()">Send</button>
                </div>
            </div>
        </div>
        <div class="footer-controls">
            <input type="text" id="remote-id" placeholder="Partner Node ID" maxlength="4" style="width: 180px; margin-bottom:0;">
            <button class="primary-btn" style="width: auto; padding: 0 40px; margin-top:0;" onclick="startConnection()">LINK SYSTEMS</button>
        </div>
    </div>

    <script>
        const CORRECT_PASS = "Sulania11";
        let peer, localStream, currentConn, selectedMode;
        let myProfile = { name: "User", detail: "Developer", pfp: "" };
        let peerProfile = { name: "Partner", detail: "Offline", pfp: "" };

        function checkPassword() { if (document.getElementById('pass-input').value === CORRECT_PASS) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('profile-setup').style.display = 'block'; } else { alert("ACCESS DENIED"); } }
        function previewPFP(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = (e) => { document.getElementById('pfp-preview').src = e.target.result; myProfile.pfp = e.target.result; }; reader.readAsDataURL(input.files[0]); } }
        function saveProfile() { myProfile.name = document.getElementById('user-name').value || "User"; myProfile.detail = document.getElementById('user-detail').value || "Pro User"; document.getElementById('my-info-name').innerText = myProfile.name; document.getElementById('my-info-detail').innerText = myProfile.detail; document.getElementById('my-info-pfp').src = myProfile.pfp || "https://via.placeholder.com/45"; document.getElementById('profile-setup').style.display = 'none'; document.getElementById('mode-selection').style.display = 'block'; }
        function setMode(mode) { selectedMode = mode; document.getElementById('mode-selection').style.display = 'none'; document.getElementById('main-content').style.display = 'flex'; if(mode === 'chat') document.getElementById('v-sec').classList.add('hidden'); if(mode === 'video') document.getElementById('c-sec').classList.add('hidden'); initApp(); }
        
        function initApp() { 
            const shortId = Math.floor(1000 + Math.random() * 9000).toString(); 
            peer = new Peer(shortId); 
            peer.on('open', id => document.getElementById('my-id').innerText = id); 
            if (selectedMode !== 'chat') { navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => { localStream = s; document.getElementById('local-video').srcObject = s; }); }
            peer.on('call', call => { call.answer(localStream); call.on('stream', s => { document.getElementById('remote-video').srcObject = s; }); });
            peer.on('connection', conn => { currentConn = conn; setupChat(); setTimeout(() => currentConn.send({ type: "PROFILE", data: myProfile }), 1000); });
        }

        function startConnection() { 
            const rId = document.getElementById('remote-id').value; 
            if(!rId) return; 
            if(selectedMode !== 'chat') { const call = peer.call(rId, localStream); call.on('stream', s => document.getElementById('remote-video').srcObject = s); }
            currentConn = peer.connect(rId); 
            currentConn.on('open', () => { currentConn.send({ type: "PROFILE", data: myProfile }); setupChat(); });
        }

        function setupChat() {
            currentConn.on('data', data => {
                if (data.type === "PROFILE") {
                    peerProfile = data.data;
                    document.getElementById('peer-info-name').innerText = peerProfile.name;
                    document.getElementById('peer-info-detail').innerText = peerProfile.detail;
                    document.getElementById('peer-info-pfp').src = peerProfile.pfp || "https://via.placeholder.com/45";
                    alert(`SYSTEM LINKED: ${peerProfile.name}`);
                } else if (data.file) {
                    const blob = new Blob([data.file], { type: data.fileType });
                    appendFileMessage(data.fileName, URL.createObjectURL(blob), 'received');
                } else { appendMessage(data, 'received'); }
            });
        }

        function sendMsg() { const msg = document.getElementById('msg-input').value; if(!msg || !currentConn) return; currentConn.send(msg); appendMessage(msg, 'sent'); document.getElementById('msg-input').value = ""; }
        function appendMessage(text, type) { const div = document.createElement('div'); div.className = `message ${type}`; const sender = type === 'sent' ? myProfile : peerProfile; div.innerHTML = `<div style="display:flex; align-items:center; margin-bottom:5px;"><img src="${sender.pfp || 'https://via.placeholder.com/20'}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;"><span style="font-size:0.75em; font-weight:bold;">${sender.name}</span></div>${text}`; document.getElementById('chat-box').appendChild(div); document.getElementById('chat-box').scrollTop = 10000; }
        function sendFile(input) { const file = input.files[0]; const reader = new FileReader(); reader.onload = (e) => { currentConn.send({ file: e.target.result, fileName: file.name, fileType: file.type }); appendFileMessage(file.name, URL.createObjectURL(file), 'sent'); }; reader.readAsArrayBuffer(file); }
        function appendFileMessage(name, url, type) { const div = document.createElement('div'); div.className = `message ${type}`; const sender = type === 'sent' ? myProfile : peerProfile; div.innerHTML = `<div style="display:flex; align-items:center; margin-bottom:5px;"><img src="${sender.pfp || 'https://via.placeholder.com/20'}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;"><span style="font-size:0.75em; font-weight:bold;">${sender.name}</span></div>📄 ${name} <a href="${url}" download="${name}" style="color:#fccd4d; font-weight:bold; display:block; margin-top:5px;">Download</a>`; document.getElementById('chat-box').appendChild(div); document.getElementById('chat-box').scrollTop = 10000; }
    </script>
</body>
</html>
